name: "Setup Python (uv)"
description: "Installs uv, a pinned Python version, and syncs project dependencies from the lockfile"
inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  cache:
    description: "Enable uv dependency caching"
    required: false
    default: "true"
  sync-args:
    description: "Extra args passed to `uv sync` (e.g. --all-extras)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.cache }}

    - name: Install dependencies
      shell: bash
      # uv sync installs the default + dev dependency groups (ruff, pytest, ...) from uv.lock.
      run: uv sync ${{ inputs.sync-args }}
