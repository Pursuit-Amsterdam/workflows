name: "Python checks"
description: "Runs Ruff lint, Ruff format check, and pytest via uv"
inputs:
  run-lint:
    description: "Run Ruff lint"
    required: false
    default: "true"
  run-format-check:
    description: "Run Ruff format check"
    required: false
    default: "true"
  run-test:
    description: "Run pytest"
    required: false
    default: "true"
  lint-command:
    description: "Ruff lint command"
    required: false
    default: "ruff check ."
  format-command:
    description: "Ruff format check command"
    required: false
    default: "ruff format --check ."
  test-command:
    description: "pytest command"
    required: false
    default: "pytest"

runs:
  using: "composite"
  steps:
    - name: Ruff lint
      if: inputs.run-lint == 'true'
      shell: bash
      run: uv run ${{ inputs.lint-command }}

    - name: Ruff format check
      if: inputs.run-format-check == 'true'
      shell: bash
      run: uv run ${{ inputs.format-command }}

    - name: Pytest
      if: inputs.run-test == 'true'
      shell: bash
      run: |
        set +e
        uv run ${{ inputs.test-command }}
        code=$?
        # ponytail: pytest exit 5 = "no tests collected"; treat as pass (mirrors Node's --passWithNoTests)
        if [ "$code" -eq 5 ]; then
          echo "No tests collected, skipping."
          exit 0
        fi
        exit "$code"
