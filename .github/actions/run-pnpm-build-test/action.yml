name: 'Build and Test'
description: 'Builds and tests the application with linting'
inputs:
  run-build:
    description: 'Run build step'
    required: false
    default: 'true'
  run-test:
    description: 'Run test step'
    required: false
    default: 'true'
  run-lint:
    description: 'Run lint step'
    required: false
    default: 'true'
  run-typecheck:
    description: 'Run type checking'
    required: false
    default: 'true'
  build-command:
    description: 'Custom build command'
    required: false
    default: 'build'
  test-command:
    description: 'Custom test command'
    required: false
    default: 'test --passWithNoTests'
  lint-command:
    description: 'Custom lint command'
    required: false
    default: 'lint'
  typecheck-command:
    description: 'Custom typecheck command'
    required: false
    default: 'typecheck'

runs:
  using: 'composite'
  steps:
    - name: Run Type Checking
      if: inputs.run-typecheck == 'true'
      shell: bash
      run: |
        TYPECHECK_SCRIPT="${{ inputs.typecheck-command }}"

        # Skip only when the script is missing from package.json.
        if ! node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts[process.argv[1]] ? 0 : 1);" "${TYPECHECK_SCRIPT}"; then
          echo "Type checking script '${TYPECHECK_SCRIPT}' not found, skipping"
          exit 0
        fi

        echo "Running type checking via '${TYPECHECK_SCRIPT}'..."
        pnpm run --silent "${TYPECHECK_SCRIPT}"
        echo "Type checking passed"

    - name: Run Linting
      if: inputs.run-lint == 'true'
      shell: bash
      run: pnpm run --if-present ${{ inputs.lint-command }}

    - name: Run Build
      if: inputs.run-build == 'true'
      shell: bash
      run: |
        echo "Building application..."
        pnpm run ${{ inputs.build-command }}
        echo "Build completed successfully"
    
    - name: Run Tests
      if: inputs.run-test == 'true'
      shell: bash
      run: |
        pnpm run --if-present ${{ inputs.test-command }}
