name: "Backend CI (Python)"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      use-custom-token:
        description: >
          Use CUSTOM_GITHUB_TOKEN (a PAT) instead of the built-in GITHUB_TOKEN to
          clone private git dependencies during `uv sync`. Required when the project
          depends on a private repo other than this one (the built-in token can't
          read a different private repo).
        required: false
        type: boolean
        default: false

      # Python quality checks
      run-lint:
        description: "Run Ruff lint"
        required: false
        type: boolean
        default: true
      run-format-check:
        description: "Run Ruff format check"
        required: false
        type: boolean
        default: true
      run-test:
        description: "Run pytest"
        required: false
        type: boolean
        default: true
      lint-command:
        description: "Ruff lint command"
        required: false
        type: string
        default: "ruff check ."
      format-command:
        description: "Ruff format check command"
        required: false
        type: string
        default: "ruff format --check ."
      test-command:
        description: "pytest command"
        required: false
        type: string
        default: "pytest"

      # Ephemeral Postgres for tests that need a real database
      postgres-enabled:
        description: >
          Start an ephemeral Postgres container on localhost:5432 before the
          checks, for test suites that run against a real database.
        required: false
        type: boolean
        default: false
      postgres-image:
        description: "Postgres image for the ephemeral test database"
        required: false
        type: string
        default: "postgres:18-alpine"
      postgres-user:
        description: "Postgres superuser name for the ephemeral test database"
        required: false
        type: string
        default: "postgres"
      postgres-password:
        description: "Postgres superuser password for the ephemeral test database"
        required: false
        type: string
        default: "postgres"
      postgres-db:
        description: "Initial database name for the ephemeral test database"
        required: false
        type: string
        default: "postgres"

      # Supabase database testing (merged from the old platform gate)
      run-supabase-test:
        description: "Spin up a local Supabase instance and run `supabase test db`"
        required: false
        type: boolean
        default: false
      seed:
        description: "Seed the local Supabase database before testing"
        required: false
        type: boolean
        default: false

      # 1Password secrets
      onepassword_enabled:
        description: "Enable 1Password secrets loading"
        required: false
        type: boolean
        default: false
      onepassword_vault:
        description: "1Password vault name"
        required: false
        type: string
        default: ""
      onepassword_item:
        description: "1Password item name"
        required: false
        type: string
        default: ""

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      CUSTOM_GITHUB_TOKEN:
        description: "PAT for cloning private git dependencies during uv sync (needs contents:read on those repos)"
        required: false

jobs:
  pipeline:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    environment: "integration"
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Postgres (ephemeral test database)
        if: inputs.postgres-enabled
        env:
          POSTGRES_IMAGE: ${{ inputs.postgres-image }}
          POSTGRES_USER: ${{ inputs.postgres-user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
          POSTGRES_DB: ${{ inputs.postgres-db }}
        # -e VAR (no value) forwards from the step env, keeping the password off
        # the command line. The readiness probe forces TCP (-h 127.0.0.1) so it
        # can't report ready during initdb's temporary socket-only boot phase.
        run: |
          set -euo pipefail
          docker run -d --name ci-postgres \
            -e POSTGRES_USER -e POSTGRES_PASSWORD -e POSTGRES_DB \
            -p 5432:5432 "$POSTGRES_IMAGE"
          echo "Waiting for Postgres to accept TCP connections..."
          for _ in $(seq 1 30); do
            if docker exec ci-postgres pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready in time." >&2
          docker logs ci-postgres >&2 || true
          exit 1

      - name: Load 1Password Secrets
        if: inputs.onepassword_enabled
        uses: Pursuit-Amsterdam/workflows/.github/actions/setup-onepassword@feature/docker-vps-deploy
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          vault-name: ${{ inputs.onepassword_vault }}
          item-name: ${{ inputs.onepassword_item }}

      - name: Setup Python (with custom token)
        if: inputs.use-custom-token
        uses: Pursuit-Amsterdam/workflows/.github/actions/setup-python@feature/docker-vps-deploy
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          github-token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}

      - name: Setup Python (with GitHub token)
        if: ${{ !inputs.use-custom-token }}
        uses: Pursuit-Amsterdam/workflows/.github/actions/setup-python@feature/docker-vps-deploy
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Python checks
        uses: Pursuit-Amsterdam/workflows/.github/actions/run-python-checks@feature/docker-vps-deploy
        with:
          working-directory: ${{ inputs.working-directory }}
          run-lint: ${{ inputs.run-lint }}
          run-format-check: ${{ inputs.run-format-check }}
          run-test: ${{ inputs.run-test }}
          lint-command: ${{ inputs.lint-command }}
          format-command: ${{ inputs.format-command }}
          test-command: ${{ inputs.test-command }}

      - name: Setup local Supabase environment and test
        if: inputs.run-supabase-test
        uses: Pursuit-Amsterdam/workflows/.github/actions/run-supabase-test@feature/docker-vps-deploy
        with:
          seed: ${{ inputs.seed }}
